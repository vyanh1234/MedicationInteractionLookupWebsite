<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MedCheck — Tra cứu thuốc an toàn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/changes.css">
</head>
<body>
  <div id="toast"></div>
  <header>
    <a class="brand" href="#home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.8 2C4 2 3.3 2.7 3.3 3.5V6c0 4.4 3.6 8 8 8s8-3.6 8-8V3.5c0-.8-.7-1.5-1.5-1.5h-1"></path>
        <path d="M12 14v4"></path>
        <path d="M12 18a3 3 0 1 0 6 0a3 3 0 1 0-6 0Z"></path>
        <path d="M8 2h3"></path>
        <path d="M13 2h3"></path>
      </svg>
      MedCheck
    </a>
    <nav id="nav">
      <a href="#home">Trang chủ</a>
      <a href="#lookup">Tra cứu</a>
      <a href="#profile" class="private">Hồ sơ bệnh nền <span id="disease-badge" class="badge" style="display:none">0</span></a>
      <a href="#history" class="private">Lịch sử</a>
      <a href="#notifications" class="private">Thông báo</a>
      <a href="#admin" class="staff">Quản trị</a>
    </nav>
    <div id="account">
      <button class="ghost" onclick="showLogin()">Đăng nhập</button>
      <button onclick="showRegister()">Đăng ký</button>
    </div>
    <button class="menu" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
  </header>
  
  <main id="app"></main>

  <footer>
    <div>
      <a class="brand" href="#home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.8 2C4 2 3.3 2.7 3.3 3.5V6c0 4.4 3.6 8 8 8s8-3.6 8-8V3.5c0-.8-.7-1.5-1.5-1.5h-1"></path>
          <path d="M12 14v4"></path>
          <path d="M12 18a3 3 0 1 0 6 0a3 3 0 1 0-6 0Z"></path>
          <path d="M8 2h3"></path>
          <path d="M13 2h3"></path>
        </svg>
        MedCheck
      </a>
      <p>Nền tảng hỗ trợ tra cứu thuốc dành cho người có bệnh nền.</p>
    </div>
    <div class="notice">
      <b>ⓘ Lưu ý y khoa</b><br>
      Thông tin chỉ mang tính tham khảo, không thay thế tư vấn của bác sĩ hoặc dược sĩ.
    </div>
  </footer>

  <dialog id="authDialog">
    <button class="close" onclick="authDialog.close()">×</button>
    <div id="authContent"></div>
  </dialog>

  <!-- Bong bóng chat nổi -->
  <button id="chat-widget-button" onclick="toggleChat()" title="Trò chuyện với AI">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
    </svg>
    <span class="chat-badge">AI</span>
  </button>

  <!-- Khung chatbox -->
  <div id="chat-box-container" class="chat-closed">
    <div class="chat-header">
      <div class="chat-title-area">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#fff;">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
        <div>
          <span class="chat-title">Trợ lý Y khoa AI</span>
          <span class="chat-status"><span class="status-dot"></span> Trực tuyến</span>
        </div>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">×</button>
    </div>
    
    <div id="chat-messages" class="chat-messages">
      <!-- Tin nhắn sẽ được thêm vào bằng JS -->
    </div>

    <!-- Hoạt họa loading AI đang nghĩ -->
    <div id="chat-loading" class="chat-loading" style="display:none;">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <form id="chat-input-form" onsubmit="sendChatMessage(event)">
      <input type="text" id="chat-input-field" placeholder="Nhập câu hỏi về y tế, thuốc..." autocomplete="off" required>
      <button type="submit" id="chat-send-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>

  <script src="/app.js"></script>
</body>
</html>
